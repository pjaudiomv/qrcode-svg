<!doctype html>
<html>
    <body>
        <div id="container" style="width: 600px"></div>
        <script type="module">
            import QRCode from '../dist/qrcode.js'
            const qrcode = new QRCode({
                content: 'Hello World!',
                container: 'svg-viewbox',
                join: true,
            })
            document.getElementById('container').innerHTML = qrcode.svg()
        </script>
    </body>
</html>
