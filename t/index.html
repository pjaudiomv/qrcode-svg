<!DOCTYPE html>
<html>
<body>
<div id="container"></div>
<script type="module">
    import QRCode from 'https://cdn.jsdelivr.net/npm/@pjaudiomv/qrcode-svg/dist/qrcode.js'
    const qrcode = new QRCode({
        content: 'Hello World!',
        container: 'svg-viewbox',
        join: true,
    })
    document.getElementById('container').innerHTML = qrcode.svg()
</script>
</body>
</html>
